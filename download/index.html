<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloads</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .box {
            background: #1e1e1e;
            padding: 20px 30px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            min-width: 320px;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
        }

        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="box">
            <span>Download fire beat 1</span>

            <a href="iconlolhaha.mp3" download="fire-beat-1.mp3">
                <button>Download</button>
            </a>
        </div>

        <div class="box">
            <span>Download fire beat 2</span>

            <a href="magnitude.mp3" download="fire-beat-2.mp3">
                <button>Download</button>
            </a>
        </div>

    </div>

</body>
</html>

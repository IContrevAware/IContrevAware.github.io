<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>DOOM</title>

  <script src="https://js-dos.com/v7/build/js-dos.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: black;
      font-family: Arial, sans-serif;
      color: white;
    }

    #splash {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    #continueBtn {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border: 1px solid white;
      background: transparent;
      color: white;
    }

    #dos {
      width: 100%;
      height: 100vh;
      display: none;
    }
  </style>
</head>

<body>

  <div id="splash">
    <div>
      This is FreeDOOM, not the original DOOM,<br>
      for legal reasons.
    </div>
    <button id="continueBtn">Continue</button>
  </div>

  <div id="dos"></div>

  <script>
    const splash = document.getElementById("splash");
    const dos = document.getElementById("dos");
    const btn = document.getElementById("continueBtn");

    btn.onclick = () => {
      splash.style.display = "none";
      dos.style.display = "block";

      Dos(dos, {
        url: "doom.jsdos"
      });
    };
  </script>

</body>
</html>
